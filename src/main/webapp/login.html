<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Ocean View Resort</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">Ocean View <span>Resort</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="rooms.html">Rooms</a></li>
        <li><a href="help.html">Help</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html" class="btn">Register</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <form id="login-form" class="form-page" action="index.html" method="get">
      <h1>Guest Login</h1>
      <p class="text-center" style="color: var(--grey); margin-bottom: 1rem;">Sign in to view your bookings and make reservations.</p>
      <div class="form-group">
        <label for="email">Email or username *</label>
        <input type="text" id="email" name="email" required placeholder="your@email.com" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password *</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary">Login</button>
      <p class="form-footer">Don't have an account? <a href="register.html">Register here</a>.</p>
    </form>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div><h4>Ocean View Resort</h4><p>Galle, Sri Lanka</p></div>
      <div><h4>Contact</h4><p>+94 91 2 234 567</p></div>
      <div><h4>Quick Links</h4><p><a href="rooms.html">Rooms</a></p><p><a href="help.html">Help</a></p></div>
    </div>
    <p class="footer-copy">&copy; Ocean View Resort. CIS6003.</p>
  </footer>
  <script src="js/app.js"></script>
</body>
</html>
